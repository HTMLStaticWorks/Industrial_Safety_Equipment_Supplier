<!DOCTYPE html>
<html lang="en">
<head>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Industrial Safety Equipment Supplier</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; transition: background-color 0.3s ease; }
        .login-card { width: 100%; max-width: 550px; border-radius: 12px; margin: auto; }
        
        /* Specific Dark Mode Background for this page only */
        html:has(body.dark-mode),
        body.dark-mode {
            background-color: #000000 !important;
        }

        @media (max-width: 991.98px) {
            .auth-theme-toggle {
                position: absolute !important;
                top: 0.25rem !important;
                right: 1rem !important;
                margin: 0 !important;
            }

            .auth-theme-toggle #theme-toggle,
            .auth-theme-toggle #theme-toggle:focus,
            .auth-theme-toggle #theme-toggle:focus-visible,
            .auth-theme-toggle #theme-toggle:active,
            .dark-mode .auth-theme-toggle #theme-toggle,
            .dark-mode .auth-theme-toggle #theme-toggle:focus,
            .dark-mode .auth-theme-toggle #theme-toggle:focus-visible,
            .dark-mode .auth-theme-toggle #theme-toggle:active,
            .auth-theme-toggle #theme-toggle:not(:hover),
            .dark-mode .auth-theme-toggle #theme-toggle:not(:hover) {
                background: transparent !important;
                color: var(--primary-color) !important;
                border-color: var(--primary-color) !important;
                box-shadow: none !important;
            }

            .auth-theme-toggle #theme-toggle:hover {
                background: var(--primary-color) !important;
                color: #fff !important;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="assets/images/logo.svg">
</head>
<body class="bg-white">

    <div class="card login-card p-4 p-md-5 shadow-lg animate-me border-0">
                <div class="text-center mb-5">
            <a href="index.html" class="brand-identity justify-content-center mb-3">
                <img src="assets/images/logo.svg" alt="Industrial Safety Logo" class="brand-icon">
                <strong class="brand-text">INDUSTRIAL<span class="brand-text-accent">SAFETY</span></strong>
            </a>
            <p class="text-muted small">Register your Company for Bulk Ordering</p>
        </div>

        <form class="needs-validation" novalidate>
            <div class="row g-3">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Company Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Industry Sector</label>
                    <select class="form-select">
                        <option>Construction</option>
                        <option>Oil & Gas</option>
                        <option>Manufacturing</option>
                        <option>Mining</option>
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">Full Name (Contact Person)</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">Professional Email</label>
                    <input type="email" class="form-control" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label fw-bold">Confirm Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <div class="col-md-12 mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label small" for="terms">
                            I agree to the <a href="#" class="fw-bold text-decoration-none text-primary link-hover-accent" title="Click to view full Terms of Service">Terms and Conditions</a> and Privacy Policy.
                        </label>
                        <div class="invalid-feedback">You must accept the terms before creating an account.</div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow-sm mb-4">Register Business Account</button>

            <div class="mb-4 text-center">
                <div class="position-relative mb-4">
                    <hr class="text-muted opacity-25">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted x-small text-uppercase fw-bold" style="white-space: nowrap;">Or Sign Up With</span>
                </div>
                <div class="d-flex justify-content-center gap-3">
                    <a href="#" class="btn social-login-btn rounded-circle google-btn" title="Sign up with Google"><i class="fab fa-google"></i></a>
                    <a href="#" class="btn social-login-btn rounded-circle facebook-btn" title="Sign up with Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="btn social-login-btn rounded-circle twitter-btn" title="Sign up with Twitter"><i class="fab fa-twitter"></i></a>
                </div>
            </div>

            <p class="text-center small text-muted mb-0">Already a registered client? <a href="login.html" class="fw-bold text-decoration-none text-primary link-hover-accent">Login Workspace</a></p>
        </form>
    </div>

    <!-- Theme Control -->
    <div class="position-fixed top-0 end-0 m-4 auth-theme-toggle">
        <span class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode" style="cursor: pointer;">🌓</span>    
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
