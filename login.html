<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Industrial Safety Equipment Supplier</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; transition: background-color 0.3s ease; }
        .login-card { width: 100%; max-width: 450px; border-radius: 12px; margin: auto; }
        
        /* Specific Dark Mode Background for this page only */
        html:has(body.dark-mode),
        body.dark-mode {
            background-color: #000000 !important;
        }

        @media (max-width: 991.98px) {
            .auth-theme-toggle {
                position: absolute !important;
                top: 0.25rem !important;
                right: 1rem !important;
                margin: 0 !important;
            }

            .auth-theme-toggle #theme-toggle,
            .auth-theme-toggle #theme-toggle:focus,
            .auth-theme-toggle #theme-toggle:focus-visible,
            .auth-theme-toggle #theme-toggle:active,
            .dark-mode .auth-theme-toggle #theme-toggle,
            .dark-mode .auth-theme-toggle #theme-toggle:focus,
            .dark-mode .auth-theme-toggle #theme-toggle:focus-visible,
            .dark-mode .auth-theme-toggle #theme-toggle:active,
            .auth-theme-toggle #theme-toggle:not(:hover),
            .dark-mode .auth-theme-toggle #theme-toggle:not(:hover) {
                background: transparent !important;
                color: var(--primary-color) !important;
                border-color: var(--primary-color) !important;
                box-shadow: none !important;
            }

            .auth-theme-toggle #theme-toggle:hover {
                background: var(--primary-color) !important;
                color: #fff !important;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="assets/images/logo.svg">
</head>
<body class="bg-white">

    <div class="card login-card p-4 p-md-5 shadow-lg animate-me border-0">
                <div class="text-center mb-5">
            <a href="index.html" class="brand-identity justify-content-center mb-3">
                <img src="assets/images/logo.svg" alt="Industrial Safety Logo" class="brand-icon">
                <strong class="brand-text">INDUSTRIAL<span class="brand-text-accent">SAFETY</span></strong>
            </a>
            <p class="text-muted small">Access your Client Dashboard</p>
        </div>

        <form class="needs-validation" novalidate>
            <div class="mb-4">
                <label class="form-label fw-bold">Professional Email</label>
                <input type="email" class="form-control form-control-lg bg-light" placeholder="email@company.com" required>
                <div class="invalid-feedback">Please enter a valid business email.</div>
            </div>
            
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <label class="form-label fw-bold mb-0">Password</label>
                    <a href="#" class="small text-decoration-none">Forgot?</a>
                </div>
                <input type="password" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label small" for="remember">Stay logged in for 30 days</label>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 py-3 shadow-sm mb-4">Secure Login</button>

            <div class="mb-4 text-center">
                <div class="position-relative mb-4">
                    <hr class="text-muted opacity-25">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted x-small text-uppercase fw-bold" style="white-space: nowrap;">Or Connect With</span>
                </div>
                <div class="d-flex justify-content-center gap-3">
                    <a href="#" class="btn social-login-btn rounded-circle google-btn" title="Login with Google"><i class="fab fa-google"></i></a>
                    <a href="#" class="btn social-login-btn rounded-circle facebook-btn" title="Login with Facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="btn social-login-btn rounded-circle twitter-btn" title="Login with Twitter"><i class="fab fa-twitter"></i></a>
                </div>
            </div>

            <p class="text-center small text-muted mb-0">Don't have an industrial account? <a href="register.html" class="fw-bold text-decoration-none">Register Company</a></p>
        </form>
    </div>

    <!-- Theme Control Floating Button -->
    <div class="position-fixed top-0 end-0 m-4 auth-theme-toggle">
<button class="btn btn-sm btn-outline-primary" id="theme-toggle" title="Toggle Dark Mode">🌓</button>    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
